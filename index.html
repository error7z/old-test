<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | Enterprise Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); }
        body { background-color: #030406; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 300% 300%; animation: rb-move 4s linear infinite; border-radius: 16px; }
        @keyframes rb-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(10, 11, 16, 0.98); backdrop-filter: blur(20px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .input-glow { background: #08090d; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; outline: none; transition: 0.3s; width: 100%; font-size: 12px; }
        .input-glow:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .btn-action { transition: 0.2s; cursor: pointer; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-1px); }
        #log-container { height: 450px; overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-6">
        
        <div class="col-span-3 space-y-4">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">P7M <span class="text-blue-500">ULTRA</span></h1>
            </div>
            
            <div class="flex gap-2 mt-2">
                <button onclick="refreshProxyIP()" class="flex-1 bg-zinc-800 border border-zinc-700 py-2 rounded text-[9px] font-bold uppercase hover:bg-zinc-700 transition">🔄 Force Rotate</button>
                <div id="proxy-status-light" class="w-3 h-3 rounded-full bg-red-600 my-auto shadow-[0_0_5px_rgba(220,38,38,0.5)]"></div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Intelligence Hub (Proxy)</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="px-host" placeholder="IP/Host" class="input-glow text-[10px] save-data">
                        <input type="text" id="px-port" placeholder="Port" class="input-glow text-[10px] save-data">
                        <input type="text" id="px-user" placeholder="User" class="input-glow text-[10px] save-data">
                        <input type="password" id="px-pass" placeholder="Pass" class="input-glow text-[10px] save-data">
                    </div>
                    <button onclick="checkRealIPReputation()" class="w-full bg-blue-600 py-2 rounded text-[10px] font-bold uppercase btn-action">Verify & Auto-Tunnel</button>
                    <div id="ip-details" class="bg-black/50 p-3 rounded-lg text-[10px] font-mono space-y-1 min-h-[100px]">
                        <p class="text-zinc-500">System Standby...</p>
                    </div>
                </div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Protocol Strategy</p>
                    <select id="rotation-mode" class="input-glow save-data" onchange="toggleBatchInput()">
                        <option value="1-by-1">1-BY-1 (Sequential)</option>
                        <option value="random">Random (Chaos Mode)</option>
                        <option value="continuous">Continuously Send (Batch)</option>
                    </select>
                    <div id="batch-container" class="hidden">
                        <input type="number" id="batch-count" value="10" placeholder="Batch Size" class="input-glow save-data text-[10px]">
                    </div>
                    <input type="number" id="send-delay" placeholder="Delay Time (MS)" value="5000" class="input-glow save-data">
                </div>
            </div>

            <div class="glass-card p-5 border-b-4 border-blue-600">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-zinc-900 p-3 rounded-xl text-center">
                        <span class="text-[9px] text-zinc-500 uppercase font-bold">Inbox</span>
                        <p id="v-sent" class="text-3xl font-black text-green-500">0</p>
                    </div>
                    <div class="bg-zinc-900 p-3 rounded-xl text-center">
                        <span class="text-[9px] text-zinc-500 uppercase font-bold">Block</span>
                        <p id="v-fail" class="text-3xl font-black text-red-500">0</p>
                    </div>
                </div>
                <button onclick="launch()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest btn-action">Initiate Blast</button>
                <button onclick="forceStop()" id="btn-stop" class="w-full bg-red-900/20 text-red-500 border border-red-500/50 py-4 rounded-xl font-black text-xs uppercase hidden">Emergency Stop</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="premium-border"><div class="glass-card p-4">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-bold text-zinc-400 uppercase">SMTP Stack: <b id="count-smtp" class="text-blue-500">0</b></span>
                        <button onclick="clearData('smtps')" class="text-[9px] text-red-500 font-bold uppercase">Clear</button>
                    </div>
                    <input type="file" id="f-smtp" accept=".csv" class="text-[10px] w-full text-zinc-500">
                </div></div>
                <div class="premium-border"><div class="glass-card p-4">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-bold text-zinc-400 uppercase">Targets: <b id="count-target" class="text-green-500">0</b></span>
                        <button onclick="clearData('targets')" class="text-[9px] text-red-500 font-bold uppercase">Clear</button>
                    </div>
                    <input type="file" id="f-target" accept=".csv" class="text-[10px] w-full text-zinc-500">
                </div></div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-5 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="s-name" placeholder="Sender Name" class="input-glow save-data">
                        <input type="text" id="s-sub" placeholder="Subject Line" class="input-glow save-data">
                    </div>
                    <textarea id="plain-body" class="input-glow h-16 save-data" placeholder="Plain Text Alt-Body"></textarea>
                    <div class="bg-blue-900/10 p-4 rounded-xl grid grid-cols-3 gap-3">
                        <div class="col-span-2"><input type="text" id="btn-url" placeholder="Redirect URL" class="input-glow save-data"></div>
                        <input type="text" id="btn-text" placeholder="Button Text" class="input-glow save-data">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <textarea id="s-body" oninput="updatePreview()" class="input-glow font-mono text-[10px] h-[350px] custom-scroll save-data" placeholder="HTML Payload..."></textarea>
                        <div class="bg-white rounded-lg overflow-hidden h-[350px] border border-zinc-800">
                            <iframe id="p-frame" class="w-full h-full border-0"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-3">
            <div class="glass-card h-full flex flex-col">
                <div class="p-4 border-b border-white/5 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-zinc-500 tracking-[3px] uppercase">Live Analytics</h3>
                    <button onclick="document.getElementById('log').innerHTML=''" class="text-[9px] text-red-500 font-bold uppercase">Wipe</button>
                </div>
                <div id="log-container" class="p-4 custom-scroll">
                    <div id="log" class="space-y-2 font-mono text-[9px]"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let smtps = [], targets = [], sent = 0, fail = 0, isRunning = false;
        let smtpPointer = 0, batchTracker = 0;

        // --- CORE FUNCTIONS ---

        async function checkRealIPReputation() {
            const light = document.getElementById('proxy-status-light');
            const display = document.getElementById('ip-details');
            const px = getProxyData();

            light.className = "w-3 h-3 rounded-full bg-yellow-500 animate-pulse";
            display.innerHTML = '<span class="text-blue-400 text-[9px] uppercase animate-pulse font-bold">Mapping Network...</span>';

            try {
                const res = await fetch('/api/check-proxy', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(px) 
                });
                const data = await res.json();

                if (data.success) {
                    display.innerHTML = `
                        <div class="text-white font-bold">IP: ${data.ip}</div>
                        <div class="text-zinc-400 uppercase text-[8px]">${data.isp}</div>
                        <div class="text-blue-500 text-[9px] font-black">REP: ${data.googleScore || 'CLEAN'}</div>
                        <div class="text-green-500 text-[9px]">STATUS: ${data.blacklistStatus || 'AUTHORIZED'}</div>
                    `;
                    light.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_12px_#22c55e]";
                    addLog(`TUNNEL STABILIZED: ${data.ip}`, "text-green-400");
                    saveAllData();
                } else { throw new Error(data.error); }
            } catch (e) {
                light.className = "w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_#dc2626]";
                display.innerHTML = `<p class="text-red-500 text-[9px] font-bold uppercase underline">Tunnel Error</p><p class="text-[8px] text-zinc-500">${e.message}</p>`;
            }
        }

        async function refreshProxyIP() {
            const light = document.getElementById('proxy-status-light');
            const display = document.getElementById('ip-details');
            light.className = "w-3 h-3 rounded-full bg-yellow-500 animate-pulse";
            display.innerHTML = '<p class="text-orange-400 text-[9px] uppercase animate-pulse font-bold">Rotating Session...</p>';

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ proxy: getProxyData(), isRefresh: true })
                });
                const data = await res.json();
                if(data.success) {
                    light.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_12px_#22c55e]";
                    display.innerHTML = `<div class="text-green-500 font-bold">NEW IDENTITY</div><div class="text-white text-[11px] font-mono">${data.ip}</div>`;
                    addLog(`IP ROTATED: ${data.ip}`, "text-blue-400");
                } else { throw new Error(data.error); }
            } catch (e) {
                light.className = "w-3 h-3 rounded-full bg-red-600";
                display.innerHTML = `<p class="text-red-500 text-[9px] uppercase font-bold">Rotation Failed</p>`;
            }
        }

        async function launch() {
            if(!smtps.length || !targets.length) return alert("FILES MISSING");
            
            isRunning = true;
            toggleUI(true);
            sent = 0; fail = 0; updateStats();
            smtpPointer = 0; batchTracker = 0;

            for(let i=0; i < targets.length; i++) {
                if(!isRunning) break;

                const mode = document.getElementById('rotation-mode').value;
                const batchSize = parseInt(document.getElementById('batch-count').value) || 10;
                let currentSmtp;

                if(mode === 'random') {
                    currentSmtp = smtps[Math.floor(Math.random() * smtps.length)];
                } else if(mode === 'continuous') {
                    currentSmtp = smtps[smtpPointer % smtps.length];
                    batchTracker++;
                    if(batchTracker >= batchSize) { smtpPointer++; batchTracker = 0; }
                } else {
                    currentSmtp = smtps[i % smtps.length];
                }

                const payload = {
                    smtpConfig: { user: currentSmtp[0], pass: currentSmtp[1], host: 'smtp.gmail.com', port: 465 },
                    mailData: { 
                        fromName: document.getElementById('s-name').value, 
                        to: targets[i][0], 
                        subject: document.getElementById('s-sub').value, 
                        html: document.getElementById('s-body').value 
                    },
                    proxy: getProxyData()
                };

                try {
                    const res = await fetch('/api/send', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    
                    if(result.success) {
                        sent++;
                        addLog(`DELIVERED: ${targets[i][0]}`, "text-green-400");
                    } else {
                        fail++;
                        addLog(`REJECTED: ${targets[i][0]} - ${result.error}`, "text-red-500");
                    }
                } catch (err) {
                    fail++;
                    addLog(`TIMEOUT: ${targets[i][0]}`, "text-red-600 text-xs");
                }

                updateStats();
                await new Promise(r => setTimeout(r, document.getElementById('send-delay').value));
            }
            isRunning = false;
            toggleUI(false);
        }

        // --- HELPERS ---

        function getProxyData() {
            return {
                host: document.getElementById('px-host').value,
                port: document.getElementById('px-port').value,
                user: document.getElementById('px-user').value,
                pass: document.getElementById('px-pass').value
            };
        }

        function handleCSV(e, type) {
            Papa.parse(e.target.files[0], { skipEmptyLines: true, complete: r => {
                const newData = r.data.filter(row => row.length > 0);
                if(type === 'smtp') { 
                    smtps = [...smtps, ...newData]; 
                    document.getElementById('count-smtp').innerText = smtps.length; 
                } else { 
                    targets = [...targets, ...newData]; 
                    document.getElementById('count-target').innerText = targets.length; 
                }
                addLog(`IMPORT: ${newData.length} ${type.toUpperCase()}s SUCCESS`, "text-blue-400 font-bold");
            }});
        }

        document.getElementById('f-smtp').onchange = e => handleCSV(e, 'smtp');
        document.getElementById('f-target').onchange = e => handleCSV(e, 'target');

        function forceStop() { isRunning = false; addLog("SYSTEM HALTED BY USER", "text-red-500 font-bold"); toggleUI(false); }
        function clearData(type) { if(type === 'smtps') { smtps = []; document.getElementById('count-smtp').innerText = 0; } else { targets = []; document.getElementById('count-target').innerText = 0; } }
        function updatePreview() { document.getElementById('p-frame').srcdoc = document.getElementById('s-body').value; saveAllData(); }
        function toggleBatchInput() { document.getElementById('batch-container').classList.toggle('hidden', document.getElementById('rotation-mode').value !== 'continuous'); }
        function toggleUI(r) { document.getElementById('btn-start').classList.toggle('hidden', r); document.getElementById('btn-stop').classList.toggle('hidden', !r); }
        function updateStats() { document.getElementById('v-sent').innerText = sent; document.getElementById('v-fail').innerText = fail; }
        function addLog(msg, color) { const div = document.createElement('div'); div.className = color; div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`; document.getElementById('log').prepend(div); }
        function saveAllData() { const data = {}; document.querySelectorAll('.save-data').forEach(el => data[el.id] = el.value); localStorage.setItem('p7m_ultra_v3', JSON.stringify(data)); }

        window.onload = () => {
            const saved = localStorage.getItem('p7m_ultra_v3');
            if(saved) {
                const data = JSON.parse(saved);
                Object.keys(data).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = data[k]; });
                updatePreview(); toggleBatchInput();
            }
        };
    </script>
</body>
</html>
